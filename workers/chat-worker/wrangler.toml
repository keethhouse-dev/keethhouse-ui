name = "keethhouse-chat"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Optional: override defaults via vars (not secrets).
# OLLAMA_API_KEY must be set as a secret: `wrangler secret put OLLAMA_API_KEY`
[vars]
OLLAMA_BASE_URL = "https://ollama.com"
# Smaller model that fits Ollama Cloud's free tier. Bump to gpt-oss:120b on a paid plan for better quality.
OLLAMA_MODEL = "gpt-oss:20b"
ALLOWED_ORIGINS = "https://www.keethhouse.in,https://keethhouse.in,https://keethhouse-dev.github.io,http://localhost:3000,http://localhost:3001"
